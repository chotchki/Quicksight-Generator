# Browser e2e in GitHub Actions (Phase W).
#
# Trigger model — `workflow_dispatch` + `push:main` only.
# DELIBERATELY no `pull_request` trigger. Rationale:
#
#   1. This is a solo-dev repo; the user pushes directly to main, no
#      PRs from forks to defend against.
#   2. Even if PRs become a thing later, this workflow exposes
#      `secrets.QS_GEN_PG_URL`, `secrets.QS_GEN_ORACLE_URL`,
#      `secrets.QS_E2E_USER_ARN`, AND assumes the `qs-gen-ci` IAM role
#      via OIDC. Letting it run on `pull_request` from a fork would
#      let attackers exfiltrate every one of those by editing the
#      workflow YAML in their PR. The right pattern there is
#      `pull_request_target` + maintainer label gate, which adds
#      complexity for zero current value.
#   3. If you reach for a `pull_request` trigger here, stop and revisit
#      Phase W's "Locked decisions" block in PLAN.md first.
#
# Setup runbook for the secrets + OIDC role + ci-bot QS user this
# workflow depends on lives in `.github/E2E_SETUP.md`.

name: E2E

# Auto-fire re-enabled v8.4.0: ResourcePrefix-tag isolation now
# scopes cleanup to the workflow's own ``qs-ci-${run_id}-pg``
# resources. A local deploy with a different ``resource_prefix``
# (e.g. ``qs-gen-postgres``) is no longer swept — its resources
# carry a different ``ResourcePrefix`` tag value AND the cleanup
# filter is fail-closed on missing tag (pre-v8.4.0 deploys are
# untouched until they're re-deployed under v8.4.0+).
#
# DELIBERATELY no `pull_request` trigger — see header comment
# rationale on the v8.3.x version of this file (preserved in git
# history). PR triggers from forks would expose
# ``secrets.QS_GEN_PG_URL`` / ``QS_GEN_ORACLE_URL`` /
# ``QS_E2E_USER_ARN`` / ``AWS_ROLE_ARN``.
on:
  workflow_dispatch:
  push:
    branches: [main]

# OIDC requires `id-token: write` on the workflow (or job) so the
# runner can mint the JWT that AWS exchanges for temporary creds.
# `contents: read` keeps the rest of the workflow least-privileged.
permissions:
  id-token: write
  contents: read

jobs:
  # W.1 — auth smoke. First job in the workflow: assume the OIDC role,
  # confirm AWS sees us, exit. Proves the trust policy + role + GHA
  # OIDC config all line up before any downstream job touches QS / DB
  # / Playwright. ~30s.
  auth-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Confirm role assumption
        run: aws sts get-caller-identity

  # W.3 — smallest wedge: full deploy + L1 API e2e against the user's
  # external Postgres. Depends on auth-smoke as a quick gate so we don't
  # burn ~10 min on a deploy when the OIDC chain is broken.
  #
  # Per-run isolation via ``resource_prefix: qs-ci-${{ github.run_id }}-pg``.
  # Each CI run carries its own prefix, so dashboards/datasets it deploys
  # are uniquely named within the QS account. Caveat (W.2 known gap):
  # ``json clean`` filters by ``L2Instance`` tag, NOT by ResourcePrefix —
  # so if you have a local deploy of the same L2 instance (spec_example)
  # open during a CI run, the workflow's cleanup step will sweep your
  # local deploy too. Solo-dev reality: don't run a local deploy of
  # spec_example while CI is running. Follow-up: extend cleanup to
  # filter by ResourcePrefix tag for true per-run isolation (queue
  # before W.5 scaling fans out concurrent jobs).
  e2e-pg-api-l1:
    needs: auth-smoke
    runs-on: ubuntu-latest
    # Serialize PG e2e jobs across runs. ``schema apply --execute``
    # drops + recreates the L2 instance's tables; concurrent runs
    # would race on the same ``spec_example_*`` table set against
    # the user's external Aurora. ``cancel-in-progress: false`` lets
    # the in-flight run finish (and clean up) before the next starts.
    concurrency:
      group: e2e-pg
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # Extras: ``deploy`` for boto3+botocore[crt], ``demo`` for
        # psycopg2, ``audit`` for the seed pipeline (data apply pulls
        # in the audit-generated baseline plants), ``e2e`` for pytest +
        # pytest-xdist + boto3-stubs. Skip ``[docs]``. Skip
        # ``playwright install`` — API tests don't render anything.
        run: uv sync --frozen --extra deploy --extra demo --extra audit --extra e2e

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate per-run config.yaml
        # ``resource_prefix`` carries the unique GHA run ID so CI runs
        # don't trample each other's QS resources. ``principal_arns``
        # includes the ci-bot ARN so embed-URL generation in W.6 has a
        # user with permission to view the dashboards (Path A — bot's
        # access is per-deploy, not account-wide ADMIN).
        run: |
          cat > /tmp/ci-pg.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          resource_prefix: "qs-ci-${{ github.run_id }}-pg"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.QS_E2E_USER_ARN }}"
          EOF

      - name: Apply schema (DDL)
        run: .venv/bin/quicksight-gen schema apply -c /tmp/ci-pg.yaml --execute

      - name: Apply seed data
        run: .venv/bin/quicksight-gen data apply -c /tmp/ci-pg.yaml --execute

      - name: Refresh matviews
        run: .venv/bin/quicksight-gen data refresh -c /tmp/ci-pg.yaml --execute

      - name: Deploy QS resources (theme + datasource + datasets + analyses + dashboards)
        run: .venv/bin/quicksight-gen json apply -c /tmp/ci-pg.yaml -o /tmp/ci-pg-out --execute

      - name: Run L1 API e2e
        env:
          QS_GEN_E2E: "1"
          QS_GEN_CONFIG: /tmp/ci-pg.yaml
          QS_E2E_USER_ARN: ${{ secrets.QS_E2E_USER_ARN }}
        run: |
          .venv/bin/pytest \
            tests/e2e/test_l1_deployed_resources.py \
            tests/e2e/test_l1_dashboard_structure.py \
            -m api -v

      # ``if: always()`` runs even if any prior step (or the test
      # itself) failed. The ``|| true`` on each clean call prevents a
      # cleanup failure (e.g. a partially-deployed resource that
      # doesn't exist yet) from masking the real test failure.
      # ``-o /tmp/empty-out`` (a directory we never write to) makes
      # ``json clean`` sweep every ``ManagedBy:quicksight-gen``
      # resource (scoped by ResourcePrefix=qs-ci-${run_id}-pg post
      # v8.4.0) since none are "in" the empty out dir.
      #
      # This per-job cleanup catches the common path (test failed,
      # step failed). It does NOT catch the runner being killed
      # mid-job (GHA hard timeout, OOM, manual cancel). The W.7
      # ``cleanup-pg`` job below is the belt-and-suspenders for
      # those cases.
      - name: Cleanup (always)
        if: always()
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/quicksight-gen json clean -c /tmp/ci-pg.yaml -o /tmp/empty-out --execute || true
          .venv/bin/quicksight-gen schema clean -c /tmp/ci-pg.yaml --execute || true

  # W.7 — workflow-level always-cleanup. Belt-and-suspenders over the
  # per-job ``Cleanup (always)`` step on ``e2e-pg-api-l1``. The per-job
  # step catches step / test failures (the common path); this job
  # catches the runner-died cases the per-job step can't:
  #
  #   - GHA 6h hard timeout kills the runner mid-step.
  #   - Runner OOM / crash. The runner is gone; no ``if: always()``
  #     handler runs because there's nothing left to run it on.
  #   - Manual workflow cancel that interrupts the runner before its
  #     step transitions complete.
  #
  # Job-level ``if: always()`` (with ``needs: [e2e-pg-api-l1]``) means
  # this job ALWAYS runs after the e2e job, regardless of whether the
  # e2e job succeeded, failed, or was cancelled — but only after, so it
  # never races a still-deploying job.
  #
  # Concurrency MUST share the ``e2e-pg`` group with ``e2e-pg-api-l1``
  # so cleanup never interleaves with another run's deploy. Schema
  # objects on the user's Aurora are scoped by the L2 instance prefix
  # (default: ``spec_example``) which is shared across runs — the
  # concurrency lock is the only thing keeping run A's cleanup from
  # dropping tables run B is mid-INSERT into.
  #
  # Idempotent with the per-job cleanup: ``json clean`` and
  # ``schema clean`` both no-op when the targets don't exist, so the
  # second sweep just confirms the first was complete.
  cleanup-pg:
    needs: [e2e-pg-api-l1]
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-pg
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        # ``deploy`` for boto3 (json clean), ``demo`` for psycopg2
        # (schema clean drops PG tables). Skip ``audit`` / ``e2e`` —
        # cleanup doesn't need the seed pipeline or pytest.
        run: uv sync --frozen --extra deploy --extra demo

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Regenerate per-run config.yaml
        # Same shape as the e2e job's config — must carry the matching
        # ``resource_prefix`` so ``json clean`` filters to this run's
        # QS resources (post-v8.4.0 ResourcePrefix-tag isolation).
        run: |
          cat > /tmp/ci-pg.yaml <<EOF
          aws_account_id: "470656905821"
          aws_region: "us-east-1"
          resource_prefix: "qs-ci-${{ github.run_id }}-pg"
          dialect: "postgres"
          demo_database_url: "${{ secrets.QS_GEN_PG_URL }}"
          principal_arns:
            - "${{ secrets.QS_E2E_USER_ARN }}"
          EOF

      - name: Sweep QS resources + drop schema objects
        # ``|| true`` so a clean failure doesn't mask the real e2e
        # failure (which already surfaced in the prior job's status).
        run: |
          mkdir -p /tmp/empty-out
          .venv/bin/quicksight-gen json clean -c /tmp/ci-pg.yaml -o /tmp/empty-out --execute || true
          .venv/bin/quicksight-gen schema clean -c /tmp/ci-pg.yaml --execute || true
