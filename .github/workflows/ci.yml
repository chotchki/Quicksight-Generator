name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage (pytest sessionstart runs pyright strict)
        run: pytest --cov=quicksight_gen --cov-report=xml --cov-report=term

  coverage-badge:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]" genbadge[coverage]

      - name: Generate coverage XML
        run: pytest --cov=quicksight_gen --cov-report=xml

      - name: Generate badge SVG
        run: genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Push badge to badges branch
        run: |
          cp coverage-badge.svg /tmp/coverage-badge.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          git checkout --orphan badges-tmp
          git rm -rf .
          cp /tmp/coverage-badge.svg coverage-badge.svg
          git add coverage-badge.svg
          git commit -m "Update coverage badge"
          git push origin badges-tmp:badges --force
