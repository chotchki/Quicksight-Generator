name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Gate: re-run the full unit suite + pyright strict before doing anything
  # publish-shaped. CI (ci.yml) runs the same checks on every push to main,
  # but tag pushes can race CI or be cut from a commit where CI was red —
  # this job makes the release pipeline self-gating so a failing test
  # can't reach TestPyPI / prod PyPI.
  # ---------------------------------------------------------------------------
  tests:
    name: Tests + pyright strict
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Graphviz (system binary; tests/test_handbook_diagrams.py shells out to `dot`)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage (pytest sessionstart runs pyright strict)
        run: pytest --cov=quicksight_gen --cov-report=xml --cov-report=term

  # ---------------------------------------------------------------------------
  # Build sdist + wheel
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build
        run: pip install build twine

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib, pathlib; \
            data = tomllib.loads(pathlib.Path('pyproject.toml').read_text()); \
            attr = data['tool']['setuptools']['dynamic']['version']['attr']; \
            mod, var = attr.rsplit('.', 1); \
            import importlib, sys; sys.path.insert(0, 'src'); \
            print(getattr(importlib.import_module(mod), var))")
          echo "tag=${TAG} package=${PKG_VERSION}"
          if [ "${TAG}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${PKG_VERSION}"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify long description renders on PyPI
        run: twine check dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Smoke-test the wheel against the unit + integration suite (no AWS)
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke test wheel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install wheel into fresh venv
        run: |
          python -m venv /tmp/qs-smoke
          /tmp/qs-smoke/bin/pip install --upgrade pip
          /tmp/qs-smoke/bin/pip install dist/*.whl pytest pytest-cov boto3-stubs[quicksight] psycopg2-binary

      - name: Verify CLI version flag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          OUT=$(/tmp/qs-smoke/bin/quicksight-gen --version)
          echo "${OUT}"
          echo "${OUT}" | grep -q "${TAG}" || { echo "::error::--version output missing tag ${TAG}"; exit 1; }

      - name: Run unit + integration tests against installed wheel
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          # Skip pytest_sessionstart's pyright gate — pyright isn't
          # installed against the smoke venv (it's a [dev] extra
          # the bake env doesn't pull). The wheel itself is the
          # subject under test, not its pyright cleanliness.
          QS_GEN_SKIP_PYRIGHT: "1"
        run: |
          /tmp/qs-smoke/bin/pytest \
            tests/test_models.py \
            tests/test_demo_data.py \
            tests/test_theme_presets.py \
            tests/test_dataset_contract.py

  # ---------------------------------------------------------------------------
  # Bake the sample out/ bundle from the installed wheel
  # ---------------------------------------------------------------------------
  bake-sample:
    name: Bake sample output bundle
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install wheel into fresh venv
        run: |
          python -m venv /tmp/qs-bake
          /tmp/qs-bake/bin/pip install --upgrade pip
          /tmp/qs-bake/bin/pip install dist/*.whl

      - name: Bake out-sample.zip
        run: /tmp/qs-bake/bin/python scripts/bake_sample_output.py

      - uses: actions/upload-artifact@v7
        with:
          name: out-sample
          path: dist/out-sample.zip
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish to TestPyPI (always on tag) — Trusted Publisher OIDC, no tokens
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [smoke, bake-sample]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/quicksight-gen
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Verify the just-published TestPyPI release actually installs.
  #
  # The local-wheel `smoke` job above proves the wheel is sound, but it
  # can't catch (a) missing files stripped by the sdist/wheel upload, or
  # (b) PyPI metadata rejections that succeed locally. Pulling from the
  # index after publish closes that gap before we promote to prod.
  #
  # CDN propagation lag is real (1-2 min after publish for the index to
  # serve the new version), so the install step retries. TestPyPI doesn't
  # mirror our dependencies (boto3, etc.) — `--extra-index-url` lets pip
  # fetch deps from prod PyPI while pulling the package itself from
  # TestPyPI.
  # ---------------------------------------------------------------------------
  verify-testpypi-install:
    name: Verify TestPyPI install
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install from TestPyPI (with retries for CDN propagation)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/qs-verify-testpypi
          /tmp/qs-verify-testpypi/bin/pip install --upgrade pip
          for attempt in 1 2 3 4 5 6; do
            echo "Attempt ${attempt}: pip install quicksight-gen==${TAG} from TestPyPI"
            if /tmp/qs-verify-testpypi/bin/pip install \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "quicksight-gen==${TAG}"; then
              echo "Install succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Install failed; sleeping 30s before retry..."
            sleep 30
          done
          echo "::error::pip install quicksight-gen==${TAG} from TestPyPI failed after 6 attempts (3 min total)"
          exit 1

      - name: Verify CLI version flag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          OUT=$(/tmp/qs-verify-testpypi/bin/quicksight-gen --version)
          echo "${OUT}"
          echo "${OUT}" | grep -q "${TAG}" || { echo "::error::--version output missing tag ${TAG}"; exit 1; }

      - name: Smoke import the public surface
        run: |
          /tmp/qs-verify-testpypi/bin/python -c "
          from quicksight_gen.common.tree import App, Sheet
          from quicksight_gen.common.tree.visuals import KPI, Table, BarChart, Sankey
          from quicksight_gen.common.tree.filters import FilterGroup
          from quicksight_gen.common.tree.actions import Drill
          from quicksight_gen.common.dataset_contract import DatasetContract, ColumnSpec
          from quicksight_gen.common.config import Config
          from quicksight_gen.apps.l1_dashboard.app import build_l1_dashboard_app
          from quicksight_gen.apps.l2_flow_tracing.app import build_l2_flow_tracing_app
          from quicksight_gen.apps.investigation.app import build_investigation_app
          from quicksight_gen.apps.executives.app import build_executives_app
          print('public surface importable')
          "

  # ---------------------------------------------------------------------------
  # Publish to PyPI (gated on TestPyPI install verify + manual environment
  # approval)
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: verify-testpypi-install
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/quicksight-gen
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---------------------------------------------------------------------------
  # Verify the just-published prod PyPI release actually installs.
  #
  # Symmetric to verify-testpypi-install: poll the prod PyPI index until
  # the new version is fetchable, install into a fresh venv, prove the
  # CLI works and the public surface imports. github-release depends on
  # this so a half-published package can't ship a GitHub Release.
  # ---------------------------------------------------------------------------
  verify-pypi-install:
    name: Verify PyPI install
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install from PyPI (with retries for CDN propagation)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/qs-verify-pypi
          /tmp/qs-verify-pypi/bin/pip install --upgrade pip
          for attempt in 1 2 3 4 5 6; do
            echo "Attempt ${attempt}: pip install quicksight-gen==${TAG} from PyPI"
            if /tmp/qs-verify-pypi/bin/pip install "quicksight-gen==${TAG}"; then
              echo "Install succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Install failed; sleeping 30s before retry..."
            sleep 30
          done
          echo "::error::pip install quicksight-gen==${TAG} from PyPI failed after 6 attempts (3 min total)"
          exit 1

      - name: Verify CLI version flag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          OUT=$(/tmp/qs-verify-pypi/bin/quicksight-gen --version)
          echo "${OUT}"
          echo "${OUT}" | grep -q "${TAG}" || { echo "::error::--version output missing tag ${TAG}"; exit 1; }

      - name: Smoke import the public surface
        run: |
          /tmp/qs-verify-pypi/bin/python -c "
          from quicksight_gen.common.tree import App, Sheet
          from quicksight_gen.common.tree.visuals import KPI, Table, BarChart, Sankey
          from quicksight_gen.common.tree.filters import FilterGroup
          from quicksight_gen.common.tree.actions import Drill
          from quicksight_gen.common.dataset_contract import DatasetContract, ColumnSpec
          from quicksight_gen.common.config import Config
          from quicksight_gen.apps.l1_dashboard.app import build_l1_dashboard_app
          from quicksight_gen.apps.l2_flow_tracing.app import build_l2_flow_tracing_app
          from quicksight_gen.apps.investigation.app import build_investigation_app
          from quicksight_gen.apps.executives.app import build_executives_app
          print('public surface importable')
          "

  # ---------------------------------------------------------------------------
  # GitHub Release with sdist + wheel + sample bundle
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: verify-pypi-install
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: out-sample
          path: dist/

      - name: Extract release notes for ${{ github.ref_name }}
        run: |
          # Match `## <tag>` whether the line is bare (`## v6.2.1`) or
          # carries a descriptive suffix (`## v6.2.1 — short title`).
          # The earlier exact-equality check (`$0 == "## " tag`) only
          # caught the bare form, so v6.x releases shipped placeholder
          # bodies. Field-2 match handles both shapes.
          awk -v tag="${GITHUB_REF_NAME}" '
            /^## v/ {
              if (capture) exit
              if ($1 == "##" && $2 == tag) { capture = 1; next }
            }
            /^---[[:space:]]*$/ { if (capture) exit }
            capture { print }
          ' RELEASE_NOTES.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "::warning::No release notes section found for ${GITHUB_REF_NAME} in RELEASE_NOTES.md"
            echo "Release ${GITHUB_REF_NAME}" > release-body.md
          fi
          echo "----- release body preview -----"
          cat release-body.md
          echo "--------------------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/out-sample.zip
          fail_on_unmatched_files: true
