site_name: QuickSight Analysis Generator
site_description: Training materials and documentation for the QuickSight financial reporting dashboards
site_url: https://chotchki.github.io/Quicksight-Generator/
repo_url: https://github.com/chotchki/Quicksight-Generator
repo_name: chotchki/Quicksight-Generator

theme:
  name: material
  logo: img/snb-mark.svg
  favicon: img/favicon.svg
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

extra_css:
  - stylesheets/sasquatch.css

nav:
  - Home: index.md
  - AR Handbook:
    - Overview: handbook/ar.md
    - Balance Drift Timelines Rollup: walkthroughs/ar/balance-drift-timelines-rollup.md
    - Two-Sided Post Mismatch Rollup: walkthroughs/ar/two-sided-post-mismatch-rollup.md
    - Expected-Zero EOD Rollup: walkthroughs/ar/expected-zero-eod-rollup.md
    - Sub-Ledger Drift: walkthroughs/ar/sub-ledger-drift.md
    - Ledger Drift: walkthroughs/ar/ledger-drift.md
    - Non-Zero Transfers: walkthroughs/ar/non-zero-transfers.md
    - Sub-Ledger Limit Breach: walkthroughs/ar/sub-ledger-limit-breach.md
    - Sub-Ledger Overdraft: walkthroughs/ar/sub-ledger-overdraft.md
    - Sweep Target Non-Zero EOD: walkthroughs/ar/sweep-target-non-zero.md
    - Concentration Master Sweep Drift: walkthroughs/ar/concentration-master-sweep-drift.md
    - ACH Origination Settlement Non-Zero EOD: walkthroughs/ar/ach-origination-non-zero.md
    - ACH Sweep Without Fed Confirmation: walkthroughs/ar/ach-sweep-no-fed-confirmation.md
    - Fed Activity Without Internal Post: walkthroughs/ar/fed-card-no-internal-catchup.md
    - GL vs Fed Master Drift: walkthroughs/ar/gl-vs-fed-master-drift.md
    - Stuck in Internal Transfer Suspense: walkthroughs/ar/stuck-in-internal-transfer-suspense.md
    - Internal Transfer Suspense Non-Zero EOD: walkthroughs/ar/internal-transfer-suspense-non-zero.md
    - Reversed Transfers Without Credit-Back: walkthroughs/ar/internal-reversal-uncredited.md
  - PR Handbook:
    - Overview: handbook/pr.md
    - Where's My Money for [Merchant]?: walkthroughs/pr/wheres-my-money-for-merchant.md
    - Did All Merchants Get Paid Yesterday?: walkthroughs/pr/did-all-merchants-get-paid.md
    - Why Is This External Transaction Unmatched?: walkthroughs/pr/why-is-this-external-transaction-unmatched.md
    - Which Sales Never Made It to Settlement?: walkthroughs/pr/which-sales-never-made-it-to-settlement.md
    - Why Does This Settlement Look Short?: walkthroughs/pr/why-does-this-settlement-look-short.md
    - Why Doesn't This Payment Match the Settlement?: walkthroughs/pr/why-doesnt-this-payment-match-the-settlement.md
    - How Much Did We Return Last Week?: walkthroughs/pr/how-much-did-we-return.md
  - Data Integration Handbook:
    - Overview: handbook/etl.md
    - How do I populate transactions?: walkthroughs/etl/how-do-i-populate-transactions.md
    - How do I validate a single account-day?: walkthroughs/etl/how-do-i-validate-a-single-account-day.md
    - How do I prove my ETL is working?: walkthroughs/etl/how-do-i-prove-my-etl-is-working.md
    - How do I tag a force-posted transfer?: walkthroughs/etl/how-do-i-tag-a-force-posted-transfer.md
    - How do I add a metadata key?: walkthroughs/etl/how-do-i-add-a-metadata-key.md
    - What to do when demo passes but prod fails?: walkthroughs/etl/what-do-i-do-when-demo-passes-but-prod-fails.md
  - Training Scenarios:
    - Account Structure: Training_Story.md
    - Schema v3 — Data Feed Contract: Schema_v3.md

markdown_extensions:
  - toc:
      permalink: true
  - md_in_html
  - pymdownx.superfences
