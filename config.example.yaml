# QuickSight Generator Configuration
#
# Copy this file to config.yaml and fill in your values.
# All values can also be set via environment variables with a QS_GEN_ prefix.

aws_account_id: "123456789012"
aws_region: "us-east-1"

# ARN of the pre-existing QuickSight datasource to query against.
# Not required when demo_database_url is set (auto-derived from account/region/prefix).
datasource_arn: "arn:aws:quicksight:us-east-1:123456789012:datasource/your-datasource-id"

# Prefix for all generated resource IDs (optional, default: qs-gen)
resource_prefix: "qs-gen"

# Theme preset (optional, default: "default")
# Available presets: default, sasquatch-bank
# theme_preset: "sasquatch-bank"

# IAM principal ARNs to grant permissions on generated resources (optional).
# Accepts a single string or a list; one ResourcePermission is emitted per ARN.
# principal_arns:
#   - "arn:aws:quicksight:us-east-1:123456789012:user/default/admin"
#   - "arn:aws:iam::123456789012:user/analyst"

# PostgreSQL connection URL for the demo apply command (optional)
# Required only when running: quicksight-gen demo apply
# demo_database_url: "postgresql://user:pass@localhost:5432/quicksight_demo"
